# k8s/v1-deployment.yaml
# Version 1.0.0 - deployed in the "product-v1" namespace

apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-catalogue
  namespace: product-v1
  labels:
    app: product-catalogue
    version: v1.0.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-catalogue
      version: v1.0.0
  template:
    metadata:
      labels:
        app: product-catalogue
        version: v1.0.0
    spec:
      containers:
        - name: product-catalogue
          image: DOCKERHUB_USERNAME/product-catalogue-service:v1.0.0
          ports:
            - containerPort: 4000
          env:
            - name: APP_VERSION
              value: "1.0.0"
            - name: PORT
              value: "4000"
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: product-catalogue-svc
  namespace: product-v1
spec:
  selector:
    app: product-catalogue
    version: v1.0.0
  ports:
    - port: 4000
      targetPort: 4000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: product-catalogue-hpa
  namespace: product-v1
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: product-catalogue
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
