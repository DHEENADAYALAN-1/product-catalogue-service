# k8s/ingress.yaml
# Path-based routing: /v1 -> product-v1 namespace, /v1.1 -> product-v1-1, /v2 -> product-v2
#
# Ingress resources can only route to Services in their OWN namespace, so we create
# small "router" ExternalName services in the default namespace that each point at the
# real service living in its version-specific namespace. The Ingress then routes to
# these router services.

apiVersion: v1
kind: Service
metadata:
  name: v1-router
  namespace: default
spec:
  type: ExternalName
  externalName: product-catalogue-svc.product-v1.svc.cluster.local
  ports:
    - port: 4000
---
apiVersion: v1
kind: Service
metadata:
  name: v1-1-router
  namespace: default
spec:
  type: ExternalName
  externalName: product-catalogue-svc.product-v1-1.svc.cluster.local
  ports:
    - port: 4000
---
apiVersion: v1
kind: Service
metadata:
  name: v2-router
  namespace: default
spec:
  type: ExternalName
  externalName: product-catalogue-svc.product-v2.svc.cluster.local
  ports:
    - port: 4000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: product-catalogue-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /v1(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: v1-router
                port:
                  number: 4000
          - path: /v1.1(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: v1-1-router
                port:
                  number: 4000
          - path: /v2(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: v2-router
                port:
                  number: 4000
